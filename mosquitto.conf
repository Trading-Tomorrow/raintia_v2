# Broker MQTT para o botao de emergencia (ESP32-S3) - ambiente controlado
# Ouve em todas as interfaces na porta 1883 para o ESP32 da LAN poder ligar.
listener 1883 0.0.0.0
# Sem autenticacao (simples, para laboratorio/ambiente controlado)
allow_anonymous true
# Logs no terminal
log_dest stdout
log_type all
